name: Deploy to TrueNAS (Dev)

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t psyko-skrubs-web-dev:latest .

      - name: Build Discord bot image
        run: docker build --platform linux/amd64 -t psyko-skrubs-bot-dev:latest ./discord-bot

      - name: Deploy web app
        run: |
          docker compose \
            -p ix-psyko-skrubs-web-dev \
            -f /mnt/.ix-apps/app_configs/psyko-skrubs-web-dev/versions/1.0.0/templates/rendered/docker-compose.yaml \
            up -d --force-recreate

      - name: Run database migrations
        run: docker exec ix-psyko-skrubs-web-dev-web-1 node migrate.js

      - name: Deploy Discord bot
        run: |
          docker stop psyko-bot-dev 2>/dev/null || true
          docker rm psyko-bot-dev 2>/dev/null || true
          docker run -d \
            --name psyko-bot-dev \
            --restart unless-stopped \
            -e DISCORD_TOKEN="${{ secrets.DISCORD_TOKEN }}" \
            -e DISCORD_CLIENT_ID="${{ secrets.DISCORD_CLIENT_ID }}" \
            -e DISCORD_GUILD_ID="${{ secrets.DISCORD_GUILD_ID }}" \
            -e BOT_SECRET="${{ secrets.BOT_SECRET }}" \
            -e SITE_URL="https://dev-cs.psykostats.com" \
            psyko-skrubs-bot-dev:latest
